<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrock Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>

      <div class="history-section">
        <div class="history-header">
          <h3>Recent Chats</h3>
          <button class="clear-all-btn" id="clearAllBtn" title="Delete all conversations">Clear all</button>
        </div>
        <ul class="chat-list" id="chatList"></ul>
      </div>

      <div class="sidebar-footer">
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <optgroup label="💬 Chat">
            <option value="us.meta.llama3-3-70b-instruct-v1:0">Llama 3.3 70B</option>
            <option value="deepseek.r1-v1:0">DeepSeek R1</option>
            <option value="deepseek.v3.2">DeepSeek V3</option>
            <option value="openai.gpt-oss-120b-1:0">GPT OSS 120B</option>
            <option value="openai.gpt-oss-20b-1:0">GPT OSS 20B</option>
          </optgroup>
          <optgroup label="👁️ Vision (Image Understanding)">
            <option value="qwen.qwen3-vl-235b-a22b">Qwen 3 VL 235B</option>
          </optgroup>
          <optgroup label="🎙️ Audio / STT">
            <option value="mistral.voxtral-small-24b-2507">Voxtral (Mistral)</option>
          </optgroup>
          <optgroup label="🎨 Image Generation">
            <option value="amazon.titan-image-generator-v2:0">Titan Image Gen v2</option>
            <option value="stability.stable-fast-upscale-v1:0">Stability Upscale</option>
            <option value="stability.stable-image-inpaint-v1:0">Stability Inpaint</option>
            <option value="stability.stable-image-remove-background-v1:0">Stability Remove BG</option>
            <option value="stability.stable-outpaint-v1:0">Stability Outpaint</option>
          </optgroup>
          <optgroup label="🎬 Video Generation">
            <option value="amazon.nova-reel-v1:1">Nova Reel v1.1</option>
          </optgroup>
          <optgroup label="🤖 Claude (Anthropic)">
            <option value="anthropic.claude-haiku-4-5-20251001-v1:0">Claude Haiku 4.5</option>
            <option value="anthropic.claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="anthropic.claude-opus-4-7">Claude Opus 4.7</option>
          </optgroup>
          <optgroup label="🌐 Amazon Nova">
            <option value="us.amazon.nova-2-lite-v1:0">Nova 2 Lite</option>
            <option value="amazon.nova-2-sonic-v1:0">Nova Sonic (TTS)</option>
            <option value="amazon.nova-2-multimodal-embeddings-v1:0">Nova Multimodal Embed</option>
          </optgroup>
          <optgroup label="📦 Embeddings / Other">
            <option value="amazon.titan-embed-image-v1">Titan Image Embed</option>
            <option value="amazon.titan-embed-text-v2:0:8k">Titan Text Embed</option>
            <option value="us.cohere.embed-v4:0">Cohere Embed v4</option>
            <option value="us.twelvelabs.marengo-embed-3-0-v1:0">Marengo Embed</option>
            <option value="global.twelvelabs.pegasus-1-2-v1:0">Pegasus 1.2</option>
          </optgroup>
        </select>

        <!-- Model type badge -->
        <div class="model-type-badge" id="modelTypeBadge">💬 Chat</div>

        <!-- TTS auto-play toggle -->
        <label class="tts-toggle-label">
          <input type="checkbox" id="autoTtsToggle">
          <span>Auto-speak AI responses</span>
        </label>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-area">
      <header class="chat-header">
        <button class="toggle-sidebar-btn" id="toggleSidebarBtn">☰</button>
        <h2 id="chatTitle">New Conversation</h2>
        <div class="model-pill" id="modelPill">Llama 3.3 70B</div>
      </header>

      <section class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <h1>Bedrock Portal</h1>
          <p>Select a model and start chatting. Supports text, vision, STT, and image generation.</p>
        </div>
      </section>

      <!-- Image Generation Panel (shown for image gen models) -->
      <div class="image-gen-panel" id="imageGenPanel" style="display:none;">
        <div class="image-gen-options">
          <div class="image-gen-size">
            <label>Size</label>
            <select id="imageSize">
              <option value="512x512">512 × 512</option>
              <option value="768x512">768 × 512</option>
              <option value="512x768">512 × 768</option>
              <option value="1024x1024">1024 × 1024</option>
            </select>
          </div>
          <div class="image-gen-info" id="imageGenInfo">Describe the image you want to generate.</div>
        </div>
      </div>

      <!-- Input Footer -->
      <footer class="chat-footer">
        <form class="input-form" id="chatForm">
          <!-- Attachment Preview -->
          <div class="attachment-preview-container" id="attachmentPreviewContainer" style="display: none;">
            <div class="attachment-preview-card">
              <span class="attachment-icon" id="attachmentIcon">📎</span>
              <span class="attachment-name" id="attachmentName">file.png</span>
              <button type="button" class="remove-attachment-btn" id="removeAttachmentBtn">&times;</button>
            </div>
          </div>

          <!-- STT Status -->
          <div class="voice-status-container" id="voiceStatusContainer" style="display: none;">
            <div class="voice-status-card">
              <span class="recording-dot" id="recordingDot"></span>
              <span id="voiceStatusText">Ready</span>
            </div>
          </div>

          <div class="textarea-wrapper">
            <!-- Attach Button -->
            <button type="button" class="attach-btn" id="attachBtn" title="Attach image or audio">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">

            <!-- Voice / Mic Button -->
            <button type="button" class="voice-btn" id="voiceBtn" title="Record audio for STT (Voxtral)">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1C10.9391 1 9.92172 1.42143 9.17157 2.17157C8.42143 2.92172 8 3.93913 8 5V11C8 12.0609 8.42143 13.0783 9.17157 13.8284C9.92172 14.5786 10.9391 15 12 15C13.0609 15 14.0783 14.5786 14.8284 13.8284C15.5786 13.0783 16 12.0609 16 11V5C16 3.93913 15.5786 2.92172 14.8284 2.17157C14.0783 1.42143 13.0609 1 12 1Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19 10V11C19 12.8565 18.2625 14.637 16.9497 15.9497C15.637 17.2625 13.8565 18 12 18C10.1435 18 8.36301 17.2625 7.05025 15.9497C5.73749 14.637 5 12.8565 5 11V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 18V23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 23H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <textarea
              id="userInput"
              placeholder="Message Bedrock..."
              rows="1"
            ></textarea>

            <button type="submit" id="sendBtn" class="send-btn" title="Send">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <p class="input-hint" id="inputHint"></p>
        </form>
      </footer>
    </main>
  </div>

  <script src="app.js?v=3.0"></script>
</body>
</html>
